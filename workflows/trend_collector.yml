name: HARM Trend Data Collector

on:
  schedule:
    # 毎日朝 06:00 (日本時間) に自動実行（UTCでは前日21:00）
    - cron: '0 21 * * *'
  workflow_dispatch:
    # GitHubの画面から手動でいつでも実行できるボタンを設置
    inputs:
      reason:
        description: '手動実行の理由'
        required: false
        default: '手動トリガーによる強制収集'

jobs:
  collect_and_push:
    runs-on: ubuntu-latest
    
    # ワークフローにリポジトリへの書き込み権限（Push権限）を付与
    permissions:
      contents: write

    steps:
    # 1. リポジトリのコードをチェックアウト
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Python環境のセットアップ (3.11系を指定)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # 2回目以降の高速化のためにキャッシュを有効化

    # 3. 依存ライブラリのインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. コレクタースクリプトの実行（フィルタ＆検証自動処理）
    - name: Run Trend Collector
      run: |
        python src/collector.py

    # 5. 生成された成果物の存在をGitステータスで確認し、自動Push
    - name: Commit and Push discovered candidates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 01_Artifacts ディレクトリをステージング
        git add 01_Artifacts/
        
        # 差分がある場合のみコミットしてPush (ない場合はパスして正常終了)
        git diff --staged --quiet || (git commit -m "chore: auto-update daily discover candidates ($(date +'%Y-%m-%d'))" && git push)
