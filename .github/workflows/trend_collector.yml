name: HARM Trend Data Collector (Latest Single File)

on:
  schedule:
    # 日本時間 7:00, 11:00, 17:00, 22:00 に実行（UTCに変換）
    - cron: '0 22,2,8,13 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '手動実行の理由'
        required: false
        default: '手動トリガーによる強制収集'

jobs:
  collect_and_push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Trend Collector
      run: |
        python src/collector.py

    - name: Commit and Push latest trend
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # trend フォルダの変更をステージング
        git add trend/
        
        git diff --staged --quiet || (git commit -m "chore: auto-update trend/latest.json ($(date +'%Y-%m-%d %H:%M:%S'))" && git push)      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. コレクタースクリプトの実行（フィルタ＆検証自動処理）
    - name: Run Trend Collector
      run: |
        python src/collector.py

    # 5. 生成された成果物の存在をGitステータスで確認し、自動Push
    - name: Commit and Push discovered candidates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 01_Artifacts ディレクトリをステージング
        git add 01_Artifacts/
        
        # 差分がある場合のみコミットしてPush (ない場合はパスして正常終了)
        git diff --staged --quiet || (git commit -m "chore: auto-update daily discover candidates ($(date +'%Y-%m-%d'))" && git push)
