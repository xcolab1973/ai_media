name: HARM Trend Data Collector

on:
  schedule:
    # 4回/日 自動実行（JST → UTC変換済み・各10〜15分前倒し）
    # Discovery シフト開始（07/11/17/22 JST）より前に push を完了させ、当日データを確実に掴ませる。
    - cron: '45 21 * * *'   # 06:45 JST（前日 21:45 UTC）← Discovery 07:00 の15分前
    - cron: '50  1 * * *'   # 10:50 JST                  ← Discovery 11:00 の10分前
    - cron: '50  7 * * *'   # 16:50 JST                  ← Discovery 17:00 の10分前
    - cron: '50 12 * * *'   # 21:50 JST                  ← Discovery 22:00 の10分前
  workflow_dispatch:
    # GitHubの画面から手動でいつでも実行できるボタンを設置
    inputs:
      reason:
        description: '手動実行の理由'
        required: false
        default: '手動トリガーによる強制収集'

# 定期実行と手動実行が重なった時の push 競合を防ぐ（実行中のものは止めない）
concurrency:
  group: trend-collector
  cancel-in-progress: false

jobs:
  collect_and_push:
    runs-on: ubuntu-latest

    # ワークフローにリポジトリへの書き込み権限（Push権限）を付与
    permissions:
      contents: write

    steps:
    # 1. リポジトリのコードをチェックアウト
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Python環境のセットアップ (3.11系を指定)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'          # requirements.txt を追加したので依存キャッシュを有効化

    # 3. 依存ライブラリのインストール（バージョン固定で再現性を確保）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. コレクタースクリプトの実行
    - name: Run Trend Collector
      run: |
        python src/collector.py

    # 5. 生成された成果物を自動Push
    - name: Commit and Push trend candidates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # trends/ ディレクトリをステージング（latest.json / note_latest.json / debug_latest.json を一括）
        git add trends/

        # 差分がある場合のみコミットしてPush（ない場合はパスして正常終了）
        git diff --staged --quiet || (git commit -m "chore: auto-update trend candidates ($(date -u +'%Y-%m-%d %H:%M') UTC)" && git push)
